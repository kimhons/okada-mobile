name: okada_rider
description: Okada Rider App - Delivery platform for Cameroon e-commerce
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared package
  okada_shared:
    path: ../shared

  # State management
  flutter_riverpod: ^2.4.0

  # UI components
  cupertino_icons: ^1.0.6

  # Networking
  dio: ^5.3.3
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_polyline_points: ^2.0.1

  # Camera & Quality Verification (KEY FEATURE!)
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  image: ^4.1.3

  # Charts
  fl_chart: ^0.65.0

  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2+1
  url_launcher: ^6.2.1
  permission_handler: ^11.0.1

  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.6
  firebase_analytics: ^10.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.6
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # App assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  # Fonts (using shared package fonts)
  fonts:
    - family: Inter
      fonts:
        - asset: ../shared/assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: ../shared/assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: ../shared/assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: ../shared/assets/fonts/Inter-Bold.ttf
          weight: 700

